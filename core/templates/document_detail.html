{% extends "base.html" %}
{% block container_class %}max-w-2xl{% endblock %}
{% block content %}
<h2 class="text-2xl font-semibold tracking-tight text-slate-900">{{ doc.title }}</h2>
<p class="mt-1 text-sm text-slate-400">
  owner id: {{ doc.owner_id }} | published: {{ doc.is_published }}
</p>
<pre class="mt-4 whitespace-pre-wrap rounded-lg border border-slate-200 bg-white p-4 text-sm text-slate-700 shadow-sm">{{ doc.body }}</pre>
{% endblock %}
