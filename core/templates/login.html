{% extends "base.html" %}{% block content %}
<h2 class="text-2xl font-semibold tracking-tight text-slate-900">Login</h2>

<form method="post" class="mt-6 space-y-4">
  {% csrf_token %}
  <div>
    <label class="block text-sm font-medium text-slate-600 mb-1">Username</label>
    <input
      name="username"
      placeholder="username"
      class="block w-full rounded-md border-0 px-3 py-2 text-slate-900 ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-slate-500"
    />
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-600 mb-1">Password</label>
    <input
      name="password"
      type="password"
      placeholder="password"
      class="block w-full rounded-md border-0 px-3 py-2 text-slate-900 ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-slate-500"
    />
  </div>
  <button
    type="submit"
    class="w-full rounded-md bg-slate-900 px-3 py-2 text-sm font-semibold text-white hover:bg-slate-700"
  >
    Log in
  </button>
</form>
{% endblock %}
