<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ mode|default:"demo" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <main class="mx-auto {% block container_class %}max-w-md{% endblock %} px-6 py-16">
      <a href="/" class="text-sm text-slate-400 hover:text-slate-600">&larr; back</a>

      <div class="mt-4 mb-6">
        <span
          class="inline-flex items-center rounded-md px-2.5 py-1 text-xs font-medium ring-1 ring-inset
          {% if mode == 'vulnerable' %}bg-rose-50 text-rose-700 ring-rose-200{% else %}bg-teal-50 text-teal-700 ring-teal-200{% endif %}"
        >
          mode: {{ mode }}
        </span>
      </div>

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
